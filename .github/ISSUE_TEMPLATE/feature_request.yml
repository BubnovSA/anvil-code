name: Feature request
description: Suggest a new capability or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the current limitation or gap.
      placeholder: "The Coder can't reliably edit files longer than ~700 lines because..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've thought about.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Retrieval (RAG / code-graph)
        - Agents (Coder / Fixer / Planner / Reviewer)
        - Orchestration / pipeline
        - VS Code extension
        - API
        - LLM backend / model-router
        - Documentation
        - Other
    validations:
      required: true
